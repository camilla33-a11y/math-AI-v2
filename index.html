<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math AI v2</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">

        <header class="app-header">
            <div class="logo">📚</div>
            <h1>Math AI v2</h1>
            <h2>생각하는 힘을 키우는 수학 플랫폼</h2>
        </header>

        <section class="welcome-card">
            <h3>😊 환영합니다!</h3>
            <p>오늘도 작은 한 걸음이 내일의 큰 성장이 됩니다.</p>
        </section>

        <section class="student-form">
            <h3>👤 학생 정보</h3>

            <label for="studentName">이름</label>
            <input type="text" id="studentName" placeholder="이름을 입력하세요">

            <label>학년</label>
            <div class="grade-group">
                <label><input type="radio" name="grade" value="1"> 1학년</label>
                <label><input type="radio" name="grade" value="2"> 2학년</label>
                <label><input type="radio" name="grade" value="3"> 3학년</label>
            </div>

            <label for="studentClass">반</label>
            <input type="number" id="studentClass" placeholder="예: 1">

            <label for="studentNumber">번호</label>
            <input type="number" id="studentNumber" placeholder="예: 15">
        </section>

        <section class="message">
            <h3>🌱 오늘의 응원</h3>
            <p>
                틀린 문제는 실패가 아닙니다.<br>
                새로운 것을 배우기 시작했다는 증거입니다.
            </p>
        </section>

        <button id="startBtn">학습 시작하기</button>

        <p class="footer">
            정답보다 성장을 응원합니다.
        </p>

    </main>

    <script src="script.js"></script>
</body>
</html>
